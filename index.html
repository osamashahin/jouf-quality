<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الموقع تحت الإنشاء | جامعة الجوف</title>
  <style>
    :root {
      --bg: #fefdf8;
      --accent: #f5c400;
      --ink: #1a1a1a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(120% 120% at 50% 0%, #fffdf2 0%, var(--bg) 60%, #f3f0e6 100%);
      font-family: "Tajawal", "Segoe UI", system-ui, sans-serif;
    }
    .frame { width: 100%; max-width: 900px; text-align: center; }
    .frame img {
      width: 100%; height: auto; display: block;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.12));
    }
    .progress {
      margin: 28px auto 0; width: min(360px, 80%); height: 8px;
      border-radius: 999px; background: rgba(0, 0, 0, 0.08); overflow: hidden;
    }
    .progress span {
      display: block; height: 100%; width: 40%; border-radius: 999px;
      background: linear-gradient(90deg, #ffd633, var(--accent), #e0a800);
      animation: slide 1.8s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-120%); }
      50% { transform: translateX(180%); }
      100% { transform: translateX(-120%); }
    }
    .note {
      margin-top: 18px; color: #555;
      font-size: clamp(0.9rem, 2.5vw, 1.05rem); letter-spacing: 0.2px;
    }
    @media (prefers-reduced-motion: reduce) {
      .progress span { animation: none; width: 60%; }
    }
  </style>
</head>
